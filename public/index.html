<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hello, World</title>
  <style>
    :root { color-scheme: light dark; }
    html, body { height: 100%; }
    body {
      margin: 0;
      display: grid;
      place-items: center;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }
    .card {
      padding: 2rem 2.5rem;
      border-radius: 12px;
      border: 1px solid color-mix(in oklab, CanvasText 20%, transparent);
      background: color-mix(in oklab, Canvas 70%, transparent);
      box-shadow: 0 6px 24px color-mix(in oklab, CanvasText 10%, transparent);
    }
    h1 { font-size: 2.25rem; margin: 0 0 0.5rem; }
    p { margin: 0; opacity: 0.8; }
    a.button {
      display: inline-block; margin-top: 1rem; text-decoration: none;
      background: color-mix(in oklab, AccentColor 75%, Canvas 25%);
      color: AccentColorText; padding: 0.6rem 1rem; border-radius: 8px;
      border: 1px solid color-mix(in oklab, AccentColor 60%, transparent);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Hello, World! 👋</h1>
    <p>Your app is running. Edit <code>public/index.html</code> to change this page.</p>
    <a class="button" href="https://developer.mozilla.org/en-US/docs/Learn/Getting_started_with_the_web/" target="_blank" rel="noreferrer">Learn the web basics</a>
  </main>
</body>
</html>
